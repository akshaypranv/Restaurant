[build]
  command = "npm run install:all && npm run build"
  publish = "client/dist"
  functions = "netlify/functions"

[build.environment]
  NODE_ENV = "development"
  SECRETS_SCAN_OMIT_KEYS = "NODE_ENV,GROQ_MODEL,PORT"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
